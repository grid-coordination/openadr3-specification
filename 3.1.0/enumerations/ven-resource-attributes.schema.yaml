$id: "./attributes.schema.json"
title: "Attributes"
description: "Attributes available for VENs and Resources"
$comment: |
    Schema for OpenADR 3 VEN and Resource attributes.
    This schema provides the definitions in the
    Attribute Enumerations table in Definition.md.

    This file is released under the Apache 2.0 license.
    Read more at: http://www.apache.org/licenses/LICENSE-2.0.html

definitions:
    LOCATION:
        $id: 'attributes.schema.json#/definitions/LOCATION'
        description: |
            Describes a single geographic point. Values[] contains 2 floats, generally
            representing longitude and latitude. Demand Response programs may define
            their own use of these fields.
        type: array
        minItems: 2
        maxItems: 2
        # This means it is a longitude-first representation of a map location.
        # It would be useful to constrain the two array entries to
        # between -90..90 and -180..180.  But, JSON Schema does not
        # support a way for individual array elements to have
        # different constraints.
        items:
            type: number
            minimum: -180
            maximum: 180

    AREA:
        $id: 'attributes.schema.json#/definitions/AREA'
        description: |
            Describes a geographic area. Values[] contains application specific data.
            Demand Response programs may define their own use of these fields, such
            as GeoJSON polygon data.
        type: array
        items:
            type: number

    MAX_POWER_CONSUMPTION:
        $id: 'attributes.schema.json#/definitions/MAX_POWER_CONSUMPTION'
        description: |
            Values contains a floating point number describing the maximum
            consumption, in kiloWatts.
        type: array
        minItems: 1
        maxItems: 1
        items:
            type: number
            minimum: 0

    MAX_POWER_EXPORT:
        $id: 'attributes.schema.json#/definitions/MAX_POWER_EXPORT'
        description: |
            Values contains a floating point number describing the maximum power the
            device can export, in kiloWatts.
        type: array
        minItems: 1
        maxItems: 1
        items:
            type: number
            minimum: 0

    DESCRIPTION:
        $id: 'attributes.schema.json#/definitions/DESCRIPTION'
        description: |
            Free-form text tersely describing a ven or resource.
        type: array
        minItems: 1
        maxItems: 1
        items:
            type: string
            minLength: 1
            maxLength: 128
